name: Deploy to Render

# A cada push na main, dispara o deploy no Render via API.
# A chave fica no secret RENDER_API_KEY (Settings > Secrets > Actions).
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/srv-d8r1rjb6sc1c73altopg/deploys"
